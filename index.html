<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/novo_primary.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVO - Debt Free. Home Ready.</title>
    <meta name="description" content="Eliminate debt faster with NOVO - your personal debt freedom tool with AI coaching">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">

    <!-- Apple Touch Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NOVO">
    <link rel="apple-touch-icon" href="/novo_primary.png">

    <!-- Social Media -->
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MFC0DXJXYB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MFC0DXJXYB');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA Service Worker with Auto-Update -->
    <script>
      if ('serviceWorker' in navigator) {
        let refreshing = false;

        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js', { updateViaCache: 'none' })
            .then((reg) => {
              console.log('NOVO Service Worker registered');

              reg.update();

              setInterval(() => {
                console.log('Checking for NOVO updates...');
                reg.update();
              }, 5 * 60 * 1000);

              const showUpdateBanner = () => {
                if (document.getElementById('novo-sw-update-banner')) return;

                const banner = document.createElement('div');
                banner.id = 'novo-sw-update-banner';
                banner.className =
                  'fixed top-0 left-0 right-0 z-[9999] bg-brand-navy text-white flex items-center justify-center px-12 py-3 text-[13px] font-medium shadow-[0_2px_8px_rgba(0,0,0,0.15)]';

                const message = document.createElement('button');
                message.type = 'button';
                message.className =
                  'bg-transparent border-0 text-white text-[13px] font-medium cursor-pointer text-center';
                message.textContent = 'NOVO has been updated. Click to reload for the latest version.';
                message.addEventListener('click', () => {
                  if (reg.waiting) {
                    reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                  }
                });

                const closeBtn = document.createElement('button');
                closeBtn.type = 'button';
                closeBtn.className =
                  'absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-0 text-white/75 hover:text-white text-base leading-none cursor-pointer px-2 py-1';
                closeBtn.setAttribute('aria-label', 'Dismiss update notification');
                closeBtn.textContent = '✕';
                closeBtn.addEventListener('click', (event) => {
                  event.stopPropagation();
                  banner.remove();
                });

                banner.appendChild(message);
                banner.appendChild(closeBtn);
                document.body.appendChild(banner);
              };

              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (!newWorker) return;

                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('NOVO update available!');
                    showUpdateBanner();
                  }
                });
              });

              if (reg.waiting) {
                showUpdateBanner();
              }
            })
            .catch((err) => {
              console.log('Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
